server:
  port: 8082

spring:
  application:
    name: relic-core

relic:
  workspace:
    path: ${user.home}/.openclaw/workspace
    # true 时 read_file 允许读取工作区外绝对路径文件
    allow-outside-read: true
  deepseek:
    # DeepSeek 模型名，可切换为支持多模态输入的模型版本
    model: deepseek-chat
    # 连接超时（仅握手阶段）
    connect-timeout-ms: 20000
    # 整个请求最大等待时长，长推理建议 >= 300000
    request-timeout-ms: 300000
    # 流式空闲超时，0 表示关闭空闲熔断
    idle-timeout-ms: 180000
  qwen:
    # Qwen 多模态模型（DashScope OpenAI 兼容）
    model: qwen-vl-plus-latest
  kimi:
    # Kimi 多模态模型（Moonshot OpenAI 兼容）
    model: kimi-k2.5
  router:
    # 主模型 provider 名称（默认 deepseek）
    primary-provider: deepseek
    # 工具调用优先使用的 provider（建议支持多模态）
    tool-provider: qwen
    # 检测到图片/音频输入时的 provider 优先级（逗号分隔）
    multimodal-providers: qwen,kimi
    # 顾问 provider 列表（逗号分隔），用于 MULTI 模式
    advisors: deepseek,kimi
    # 开启后会优先调用 LocalIntentClassifier（若存在实现 Bean）
    enable-local-classifier: true
    # 本地语义分类最长等待时间，建议 >= classify-timeout-ms
    local-classifier-budget-ms: 9000
    # 本地模型仅用于语义分类和云端断连时的兜底回答
    local-model:
      endpoint: http://127.0.0.1:11434
      model: gemma3:1b
      disable-thinking: true
      # 分类超时调高，降低冷启动/排队导致的误回退
      classify-timeout-ms: 8000
      answer-timeout-ms: 12000
      # 会话自动命名（新对话）超时与长度
      title-timeout-ms: 4000
      title-max-length: 18

  chat:
    auto-title:
      enabled: true
      fallback-max-length: 18

  stream:
    watchdog:
      # 是否启用统一流式看门狗（对所有 provider 生效）
      enabled: true
      # 超过该空闲时长未收到任何 chunk 则触发超时
      idle-timeout-ms: 180000
      # 看门狗轮询检查间隔
      check-interval-ms: 3000

